# ----------------------------------------------------------------
# Secret: guarda la contraseña de PostgreSQL de forma segura.
# Dentro del clúster los valores se almacenan codificados en base64.
# Ejercicio de referencia: 06_secrets
# ----------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: db-secret            # nombre para referenciarlo desde otros recursos
type: Opaque                 # Opaque = datos genéricos no estructurados
stringData:                  # Escribimos el valor en texto plano; Kubernetes lo codifica
  password: supersecure